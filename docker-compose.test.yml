# Test override: points api + scanner at the test Postgres instance.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build
services:
  api:
    environment:
      DATABASE_URL: postgresql+asyncpg://op_seller:op_seller@postgres-test:5432/op_seller
    ports:
      - "8001:8000"  # Different host port to avoid conflict with prod
    depends_on:
      postgres-test:
        condition: service_healthy
    restart: "no"  # Don't auto-restart in tests

  scanner:
    environment:
      DATABASE_URL: postgresql+asyncpg://op_seller:op_seller@postgres-test:5432/op_seller
    depends_on:
      postgres-test:
        condition: service_healthy
    restart: "no"  # Don't auto-restart in tests
