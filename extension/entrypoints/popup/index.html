<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 350px;
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ccc;
    }
    .section {
      background: #1e1e2e;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #333;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    input {
      background: #2a2a3e;
      color: #fff;
      border: 1px solid #444;
      padding: 7px 10px;
      width: 100%;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 6px;
      outline: none;
    }
    input:focus { border-color: #6cf; }
    .btn-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    button {
      background: #3498db;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { opacity: 0.9; }
    button.start { background: #2ecc71; }
    button.stop { background: #e74c3c; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-text { font-size: 11px; color: #888; }
    .master-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-detail {
      font-size: 11px;
      color: #888;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h2>OP Seller</h2>

  <div class="section">
    <div class="section-title">Mode</div>
    <select id="mode-select" style="background:#2a2a3e;color:#fff;border:1px solid #444;padding:7px 10px;width:100%;border-radius:4px;font-size:13px;outline:none;">
      <option value="algo">Algo Trading</option>
      <option value="op-selling">OP Selling</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">EA Login (auto-recovery)</div>
    <input type="email" id="email" placeholder="EA Email">
    <input type="password" id="password" placeholder="EA Password">
    <div class="btn-row">
      <button id="save-btn">Save</button>
      <span class="status-text" id="creds-status"></span>
    </div>
  </div>

  <div class="section">
    <div class="section-title" id="control-title">Algo Trading</div>
    <input type="number" id="budget" placeholder="Budget (coins)">
    <div class="btn-row">
      <button id="start-btn" class="start">Start</button>
      <button id="stop-btn" class="stop">Stop</button>
    </div>
    <div class="status-text" id="algo-status" style="margin-top: 8px;"></div>
  </div>

  <div class="section">
    <div class="section-title">Session Status</div>
    <div class="master-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-label"></span>
    </div>
    <div class="status-detail" id="status-detail"></div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
