services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: op_seller
      POSTGRES_PASSWORD: op_seller
      POSTGRES_DB: op_seller
    ports:
      - "5432:5432"
    volumes:
      - D:/op-seller/postgres_data:/var/lib/postgresql/data
    command: postgres -c max_connections=200 -c shared_buffers=1GB -c effective_cache_size=2GB -c work_mem=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U op_seller"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:17
    environment:
      POSTGRES_USER: op_seller
      POSTGRES_PASSWORD: op_seller
      POSTGRES_DB: op_seller
    ports:
      - "5433:5432"
    volumes:
      - D:/op-seller/postgres_data_test:/var/lib/postgresql/data
    command: postgres -c max_connections=200 -c shared_buffers=1GB -c effective_cache_size=2GB -c work_mem=64MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U op_seller"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn src.server.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://op_seller:op_seller@postgres:5432/op_seller
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  scanner:
    build: .
    command: python -m src.server.scanner_main
    environment:
      DATABASE_URL: postgresql+asyncpg://op_seller:op_seller@postgres:5432/op_seller
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
