services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: op_seller
      POSTGRES_PASSWORD: op_seller
      POSTGRES_DB: op_seller
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U op_seller"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
